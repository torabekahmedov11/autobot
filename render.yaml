services:
  - type: web
    name: instagram-autobot
    runtime: python
    buildCommand: "pip install -r requirements.txt && python -m alembic upgrade head"
    startCommand: "gunicorn app.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: PYTHONPATH
        value: "."
      - key: DATABASE_URL
        fromDatabase:
          name: instagram-autobot-db
          property: connectionURI
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: IG_APP_ID
        sync: false
      - key: IG_APP_SECRET
        sync: false
      - key: IG_VERIFY_TOKEN
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: LICENSE_MASTER_KEY
        sync: false
    healthCheckPath: /health

databases:
  - name: instagram-autobot-db
    plan: free
    databaseName: instagram_autobot
